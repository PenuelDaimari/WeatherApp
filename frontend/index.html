<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="main">
    <div id="input">
        <input id="city-input" type="text" placeholder="Enter your Name">
        <button id="search-button">Enter</button>
    </div>
    <div id="name"></div>
    <button id="get-location-button">Get Location</button>
    <div id="info">
        <h1 id="city-name">Weather Info</h1>
        <p id="city-lat"></p>
        <p id="city-lon"></p>
        <p id="city-time"></p>
        <p id="city-temperature"></p>
        <p id="city-humidity"></p>
        <p id="city-chance-of-rain"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
